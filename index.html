<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="my-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="my-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
  <title>Energy Meter - Consumer View</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Energy Meter">


  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 95%;
      max-width: 400px;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      margin: 8px 0;
      border-radius: 12px;
    }

    h3 { margin: 5px 0; text-align: center; cursor: pointer; }

    .row {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      margin: 4px 0;
    }

    .status {
      font-size: 12px;
      text-align: center;
      margin-top: 8px;
    }

    #relayState {
      font-weight: bold;
      text-align: center;
      margin-top: 4px;
    }

    .on { color: #22c55e; }   /* Green for ON */
    .off { color: #ef4444; }  /* Red for OFF */

    /* Settings Styling */
    #settingsArea {
      display: none; /* Hidden by default */
      border-top: 1px solid #334155;
      padding-top: 10px;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
    }
    .btn-save {
      width: 100%;
      background: #3b82f6;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <h3 onclick="toggleSettings()">Smart Energy Meter ⚙️</h3>
    
    <div id="settingsArea">
      <p style="font-size: 12px; text-align: center;">Enter Meter ID to Connect</p>
      <input type="number" id="meterIDInput" placeholder="Enter Meter ID (Channel ID)">
      <button class="btn-save" onclick="saveMeterID()">Connect Meter</button>
    </div>

    <div id="displayArea">
      <div class="row"><span>V:</span><span id="v">--</span></div>
      <div class="row"><span>I:</span><span id="i">--</span></div>
      <div class="row"><span>P:</span><span id="p">--</span></div>
      <div class="row"><span>kWh:</span><span id="e">--</span></div>
      <div class="row"><span>₦:</span><span id="b">--</span></div>
      <div class="row"><span>Tariff:</span><span id="t">--</span></div>
      <div class="row"><span>Band:</span><span id="bd">--</span></div>
      <div class="row"><span>Power:</span><span id="relayState" class="off">--</span></div>
    </div>
  </div>

  <div class="card status">
    <div id="status">Waiting for Meter ID...</div>
    <div id="time">--</div>
  </div>

</div>

<script>
const readAPI = "SPJRGJWPA6BSL7PS";
let channelID = localStorage.getItem("savedMeterID") || "";

// Toggle Settings View
function toggleSettings() {
  const area = document.getElementById("settingsArea");
  area.style.display = (area.style.display === "block") ? "none" : "block";
}

// Save ID to memory
function saveMeterID() {
  const val = document.getElementById("meterIDInput").value;
  if(val) {
    localStorage.setItem("savedMeterID", val);
    channelID = val;
    toggleSettings();
    document.getElementById("status").innerText = "🔄 Connecting...";
    fetchData();
  }
}

let lastData = { v:"--", i:"--", p:"--", e:"--", b:"--", t:"--", bd:"--", relay:"--" };

function safe(val, oldVal) {
  if (val === null || val === undefined || val === "" || val === "NaN") return oldVal;
  return val;
}

async function fetchData() {
  if(!channelID) {
    document.getElementById("status").innerText = "⚠️ Please tap title to set Meter ID";
    return;
  }

  try {
    const res = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds/last.json?api_key=${readAPI}`);
    const d = await res.json();

    if(d === -1 || !d.field1) {
       document.getElementById("status").innerText = "❌ Invalid Meter ID";
       return;
    }

    lastData.v = safe(d.field1, lastData.v);
    lastData.i = safe(d.field2, lastData.i);
    lastData.p = safe(d.field3, lastData.p);
    lastData.e = safe(d.field4, lastData.e);
    lastData.b = safe(d.field5, lastData.b);
    lastData.t = safe(d.field6, lastData.t);

    let bandValue = d.field7 ? d.field7.toString().trim() : "";
    if (bandValue === "65" || bandValue.toUpperCase() === "A") lastData.bd = "A";
    else if (bandValue === "66" || bandValue.toUpperCase() === "B") lastData.bd = "B";
    else lastData.bd = "--";

    let relayVal = d.field8;
    if (relayVal == 1) {
      lastData.relay = "ON";
      document.getElementById("relayState").className = "on";
    } else {
      lastData.relay = "OFF";
      document.getElementById("relayState").className = "off";
    }

    document.getElementById("v").innerText = lastData.v;
    document.getElementById("i").innerText = lastData.i;
    document.getElementById("p").innerText = lastData.p;
    document.getElementById("e").innerText = lastData.e;
    document.getElementById("b").innerText = lastData.b;
    document.getElementById("t").innerText = lastData.t;
    document.getElementById("bd").innerText = lastData.bd;
    document.getElementById("relayState").innerText = lastData.relay;

    document.getElementById("status").innerText = "✅ Meter Online";
    document.getElementById("time").innerText = new Date().toLocaleTimeString();

  } catch(err) {
    document.getElementById("status").innerText = "❌ Connection Error";
  }
}

setInterval(fetchData, 5000);
fetchData();
</script>

</body>
</html>
